$kind: http-request
url: "{{base_url}}/report"
method: POST
headers:
  - key: X-REST-KEY
    value: "123"
    disabled: true
body:
  type: json
  content: |-
    {
        "name": "SETTLEMENT_REPORT",
        "description": "Restaurant Settlement Report - Date wise",
        "collectionName": "settlements",
        "parameters": [
            {
                "name": "restaurantId",
                "type": "string"
            },
            {
                "name": "startDate",
                "type": "date"
            },
            {
                "name": "endDate",
                "type": "date"
            }
        ],
        "query": [
            {
                "$match": {
                    "settlement_status": {
                        "$in": [
                            "PENDING",
                            "COMPLETED"
                        ]
                    },
                    "restaurant_id": "{{restaurantId}}",
                    "computed_at": {
                        "$gte": "{{startDate}}",
                        "$lte": "{{endDate}}"
                    }
                }
            },
            {
                "$group": {
                    "_id": "$restaurant_id",
                    "totalOrders": {
                        "$sum": 1
                    },
                    "itemTotal": {
                        "$sum": "$item_total"
                    },
                    "totalDiscount": {
                        "$sum": "$discount"
                    },
                    "totalTax": {
                        "$sum": "$tax"
                    },
                    "totalBill": {
                        "$sum": "$bill"
                    },
                    "totalNetBill": {
                        "$sum": "$net_bill"
                    },
                    "totalPlatformFee": {
                        "$sum": "$platform_fee"
                    },
                    "totalPosFee": {
                        "$sum": "$pos_fee"
                    },
                    "totalPaymentGatewayFee": {
                        "$sum": "$payment_gateway_fee"
                    },
                    "totalFees": {
                        "$sum": "$total_fees"
                    },
                    "totalDeliveryCharge": {
                        "$sum": "$delivery_charge"
                    },
                    "totalPlatformDeliveryShare": {
                        "$sum": "$platform_delivery_share"
                    },
                    "totalMerchantDeliveryShare": {
                        "$sum": "$merchant_delivery_share"
                    },
                    "totalSettlement": {
                        "$sum": "$total_settlement"
                    }
                }
            },
            {
                "$lookup": {
                    "from": "restaurants",
                    "localField": "_id",
                    "foreignField": "_id",
                    "as": "restaurant_info"
                }
            },
            {
                "$unwind": {
                    "path": "$restaurant_info",
                    "preserveNullAndEmptyArrays": true
                }
            },
            {
                "$addFields": {
                    "partnerName": "$restaurant_info.name",
                    "restaurantId": "$_id",
                    "startDate": {
                        "$literal": "{{startDate}}"
                    },
                    "endDate": {
                        "$literal": "{{endDate}}"
                    }
                }
            },
            {
                "$project": {
                    "_id": 0,
                    "restaurantId": 1,
                    "partnerName": 1,
                    "totalOrders": 1,
                    "itemTotal": {
                        "$round": [
                            "$itemTotal",
                            2
                        ]
                    },
                    "totalDiscount": {
                        "$round": [
                            "$totalDiscount",
                            2
                        ]
                    },
                    "totalTax": {
                        "$round": [
                            "$totalTax",
                            2
                        ]
                    },
                    "totalBill": {
                        "$round": [
                            "$totalBill",
                            2
                        ]
                    },
                    "totalNetBill": {
                        "$round": [
                            "$totalNetBill",
                            2
                        ]
                    },
                    "totalPlatformFee": {
                        "$round": [
                            "$totalPlatformFee",
                            2
                        ]
                    },
                    "totalPosFee": {
                        "$round": [
                            "$totalPosFee",
                            2
                        ]
                    },
                    "totalPaymentGatewayFee": {
                        "$round": [
                            "$totalPaymentGatewayFee",
                            2
                        ]
                    },
                    "totalFees": {
                        "$round": [
                            "$totalFees",
                            2
                        ]
                    },
                    "totalDeliveryCharge": {
                        "$round": [
                            "$totalDeliveryCharge",
                            2
                        ]
                    },
                    "totalPlatformDeliveryShare": {
                        "$round": [
                            "$totalPlatformDeliveryShare",
                            2
                        ]
                    },
                    "totalMerchantDeliveryShare": {
                        "$round": [
                            "$totalMerchantDeliveryShare",
                            2
                        ]
                    },
                    "totalSettlement": {
                        "$round": [
                            "$totalSettlement",
                            2
                        ]
                    },
                    "startDate": 1,
                    "endDate": 1
                }
            },
            {
                "$sort": {
                    "totalSettlement": -1
                }
            }
        ]
    }
order: 4000
